name: 'Propagate Release'
description: |
  Propagates changes from a release branch forward to subsequent releases and develop.
  Handles version conflicts by creating intermediate merge branches.

inputs:
  source_branch:
    description: 'Source branch to propagate from (e.g. release/0.1)'
    required: true
  github_token:
    description: 'GitHub token with repo permissions'
    required: true
  git_user_name:
    description: 'Git user name for commits'
    required: false
    default: 'github-actions[bot]'
  git_user_email:
    description: 'Git user email for commits'
    required: false
    default: 'github-actions[bot]@users.noreply.github.com'
  auto_merge:
    description: 'Attempt automatic merge (true) or just create PR (false)'
    required: false
    default: 'true'

outputs:
  propagated_to:
    description: 'Comma-separated list of branches propagated to'
    value: ${{ steps.propagate.outputs.propagated_to }}

runs:
  using: 'composite'
  steps:
    - name: Checkout full history
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ inputs.github_token }}

    - name: Configure git
      shell: bash
      run: |
        git config user.name "${{ inputs.git_user_name }}"
        git config user.email "${{ inputs.git_user_email }}"

    - name: Propagate changes
      id: propagate
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        SOURCE_BRANCH: ${{ inputs.source_branch }}
        AUTO_MERGE: ${{ inputs.auto_merge }}
      run: |
        python3 - <<'PYTHON_EOF'
        import os
        import re
        import subprocess
        import sys

        source = os.environ["SOURCE_BRANCH"]
        auto_merge = os.environ["AUTO_MERGE"] == "true"
        repo = os.environ["GITHUB_REPOSITORY"]

        def run(cmd, check=True, capture=True):
            result = subprocess.run(cmd, shell=True, capture_output=capture, text=True)
            if check and result.returncode != 0:
                print(f"ERROR: {cmd}\n{result.stderr}")
                sys.exit(result.returncode)
            return result.stdout.strip()

        # Fetch all branches
        run("git fetch --all --prune")

        # Get all remote release branches sorted by version
        branches_raw = run("git branch -r --list 'origin/release/*'")
        release_branches = []
        for b in branches_raw.splitlines():
            b = b.strip().replace("origin/", "")
            if b:
                release_branches.append(b)

        def parse_release_version(branch):
            m = re.match(r'release/(\d+)\.(\d+)', branch)
            if m:
                return (int(m.group(1)), int(m.group(2)))
            return (0, 0)

        release_branches.sort(key=parse_release_version)

        # Find branches after source
        source_ver = parse_release_version(source)
        targets = [b for b in release_branches if parse_release_version(b) > source_ver]
        targets.append("develop")

        print(f"Source: {source}")
        print(f"Propagation targets: {targets}")

        propagated_to = []
        current_source = source

        for target in targets:
            print(f"\n{'='*50}")
            print(f"Propagating: {current_source} → {target}")

            # Checkout target
            run(f"git checkout {target}")
            run(f"git pull origin {target}")

            # Attempt merge
            merge_result = subprocess.run(
                f"git merge origin/{current_source} --no-edit -m 'chore: propagate {current_source} into {target} [skip ci]'",
                shell=True, capture_output=True, text=True
            )

            if merge_result.returncode == 0:
                print(f"✅ Merged {current_source} → {target} cleanly")
                run(f"git push origin {target}")
                propagated_to.append(target)
            else:
                # Merge conflict — create intermediate PR
                print(f"⚠️ Merge conflict detected. Creating intermediate branch for PR.")
                run("git merge --abort", check=False)
                intermediate = f"merge/{current_source.replace('/', '-')}-to-{target.replace('/', '-')}"
                run(f"git checkout -b {intermediate}")

                # Try merge again on intermediate
                merge_result2 = subprocess.run(
                    f"git merge origin/{current_source} --no-edit",
                    shell=True, capture_output=True, text=True
                )
                if merge_result2.returncode != 0:
                    run("git merge --abort", check=False)

                run(f"git push origin {intermediate}")

                # Create PR via gh CLI
                pr_title = f"chore: propagate {current_source} into {target}"
                pr_body = f"Automatic propagation from `{current_source}` to `{target}`.\n\n⚠️ Manual conflict resolution required."
                run(f'gh pr create --repo {repo} --base {target} --head {intermediate} --title "{pr_title}" --body "{pr_body}"', capture=False)
                print(f"📝 PR created: {intermediate} → {target}")
                propagated_to.append(f"PR:{target}")

            current_source = target

        result = ",".join(propagated_to)
        print(f"\n✅ Propagation complete: {result}")
        with open(os.environ["GITHUB_OUTPUT"], "a") as f:
            f.write(f"propagated_to={result}\n")
        PYTHON_EOF